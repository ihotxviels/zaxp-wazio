# ============================================================
# ⚙️ CONFIGURAÇÃO NGINX OTIMIZADA PARA CLOUDPANEL — WAZIO.IO
# ============================================================

server {
  listen 80;
  listen [::]:80;
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  {{ssl_certificate_key}}
  {{ssl_certificate}}
  server_name zapx1-analytics.site www.zapx1-analytics.site;
  {{root}}

  {{nginx_access_log}}
  {{nginx_error_log}}

  # 🔥 CORS GLOBAL PARA API
  add_header Access-Control-Allow-Origin "*" always;
  add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
  add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With" always;

  if ($request_method = OPTIONS) {
      return 204;
  }

  if ($scheme != "https") {
    rewrite ^ https://$host$uri permanent;
  }

  location ~ /.well-known {
    auth_basic off;
    allow all;
  }

  {{settings}}

  # ─── SEGURANÇA: BLOQUEIO DE PASTAS SENSÍVEIS WAZIO ───
  location ~* ^/wazio/(app|core|logs|brain|node_modules|vendor|config\.php|\.git|\.env) {
      deny all;
      return 403;
  }

  # ✅ EXCEÇÕES: Scripts que precisam de acesso via Web
  location ~ ^/wazio/(core/schema_master_setup\.php|webhook_handler\.php|api/flow_webhook)$ {
      allow all;
      include fastcgi_params;
      fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
      fastcgi_pass 127.0.0.1:{{php_fpm_port}};
  }

  # ─── ROTEAMENTO (FRONT CONTROLLER) ───
  location /wazio/ {
      try_files $uri $uri/ /wazio/index.php?$args;
  }

  location / {
      try_files $uri $uri/ /index.php?$args;
  }

  index index.php index.html;

  location ~ \.php$ {
    include fastcgi_params;
    fastcgi_intercept_errors on;
    fastcgi_index index.php;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    try_files $uri =404;
    fastcgi_read_timeout 600;
    fastcgi_send_timeout 600;
    fastcgi_param HTTPS "on";
    fastcgi_param SERVER_PORT 443;
    fastcgi_pass 127.0.0.1:{{php_fpm_port}};
    fastcgi_param PHP_VALUE "{{php_settings}}";
  }

  location ~* ^.+\.(css|js|jpg|jpeg|gif|png|ico|gz|svg|svgz|ttf|otf|woff|woff2|eot|mp4|ogg|ogv|webm|webp|zip|swf|map)$ {
    add_header Access-Control-Allow-Origin "*";
    expires max;
    access_log off;
  }

  if (-f $request_filename) {
    break;
  }
}
